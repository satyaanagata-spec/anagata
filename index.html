<!DOCTYPE html>
<html>
<head>
  <title>anagata</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f8f8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      text-align: center;
      max-width: 650px;
      padding: 20px;
    }

    /* 🔥 YOUR LOGO */
    .logo {
      width: 220px; /* perfect size for your logo */
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      color: #777;
      margin-top: 10px;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    .headline {
      margin-top: 25px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #1a1a1a;
      font-weight: 400;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
    }

    .description {
      margin-top: 20px;
      font-size: 13px;
      color: #8a8a8a;
      line-height: 1.8;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }

    .coming {
      margin-top: 30px;
      font-size: 11px;
      letter-spacing: 4px;
      color: #b5b5b5;
      opacity: 0;
      animation: fadeIn 3.5s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.05;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <div class="tagline">
      quietly becoming
    </div>

    <div class="headline">
      ESCAPE THE ORDINARY
    </div>

    <div class="description">
      between flights and quiet moments —  
      notes on travel, simplicity, and a life well curated
    </div>

    <div class="coming">
      COMING SOON
    </div>

  </div>

</body>
</html>
