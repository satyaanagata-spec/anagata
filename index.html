<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAGATA</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: #F7F3EE;
  color: #0F2A44;
  font-family: Georgia, "Times New Roman", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.wrap {
  width: 100%;
  max-width: 820px;
  transform: translateY(-50px);
}

/* LOGO FIX */
.logo {
  display: block;
  width: 420px;
  max-width: 90%;
  height: auto;
  margin: 0 auto 50px auto;
}

/* fallback if image fails */
.logo:after {
  content: "ANAGATA";
  display: none;
}

/* TEXT */
.eyebrow {
  font-family: Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #C6A96B;
  margin-bottom: 12px;
}

h1 {
  font-size: clamp(34px, 5.5vw, 66px);
  line-height: 1.05;
  font-weight: 400;
  margin-bottom: 18px;
}

.subtext {
  font-family: Arial, sans-serif;
  font-size: 15px;
  color: #4A5968;
  margin-bottom: 22px;
}

.coming {
  font-family: Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #C6A96B;
}

/* MOBILE */
@media (max-width: 600px) {
  .wrap {
    transform: translateY(-20px);
  }

  .logo {
    width: 240px;
    margin-bottom: 35px;
  }

  h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <!-- 🔥 FIXED PATH (change ONLY if your file name is different) -->
  <img src="./2PNG.png" class="logo" alt="ANAGATA logo">

  <div class="eyebrow">A personal journal</div>

  <h1>
    Somewhere Between<br>
    Here and There
  </h1>

  <div class="subtext">
    Travel, stillness, and the moments in between
  </div>

  <div class="coming">
    Coming soon
  </div>

</div>

</body>
</html>
