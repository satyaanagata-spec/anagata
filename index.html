<!DOCTYPE html>
<html>
<head>
  <title>anagata</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f8f6f2;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
    }

    .container {
      text-align: center;
      max-width: 760px;
      padding: 40px 24px;
    }

    .logo {
      width: 420px;
      max-width: 90%;
      margin-bottom: 56px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      color: #8a8a8a;
      margin-bottom: 18px;
      text-transform: lowercase;
    }

    .headline {
      font-size: 15px;
      letter-spacing: 3px;
      color: #1f1f1f;
      margin-bottom: 24px;
    }

    .description {
      font-size: 14px;
      line-height: 1.9;
      color: #7d7d7d;
      max-width: 620px;
      margin: 0 auto 28px;
    }

    .coming {
      font-size: 11px;
      letter-spacing: 4px;
      color: #b2b2b2;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Anagata Logo.png" class="logo" alt="Anagata logo">

    <div class="tagline">quietly becoming</div>

    <div class="headline">ESCAPE THE ORDINARY</div>

    <div class="description">
      between flights and quiet moments, notes on travel, simplicity, and a life well curated
    </div>

    <div class="coming">COMING SOON</div>
  </div>
</body>
</html>
