<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANAGATA</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0F2A44;
      --gold: #C6A96B;
      --cream: #F7F3EE;
      --text-soft: #4f6274;
      --line: rgba(15, 42, 68, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      text-align: center;
      padding: 70px 24px 40px;
    }

    .page {
      width: 100%;
      max-width: 760px;
    }

    .logo {
      width: 230px;
      max-width: 75%;
      display: block;
      margin: 0 auto 48px;
    }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    .headline {
      font-family: 'EB Garamond', serif;
      font-size: clamp(46px, 6vw, 74px);
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 0.01em;
      margin: 0;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--line);
      margin: 28px auto 28px;
    }

    .description {
      max-width: 540px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.9;
      color: var(--text-soft);
    }

    .coming {
      margin-top: 42px;
      font-size: 10px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--gold);
    }

    @media (max-width: 640px) {
      body {
        padding: 48px 20px 32px;
      }

      .logo {
        width: 190px;
        margin-bottom: 38px;
      }

      .headline {
        line-height: 1.02;
      }

      .description {
        font-size: 14px;
      }

      .coming {
        margin-top: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <img src="./OLLA.png" class="logo" alt="ANAGATA logo" />

    <div class="tagline">a personal journal</div>

    <h1 class="headline">
      Somewhere Between<br>
      Here and There
    </h1>

    <div class="divider"></div>

    <p class="description">
      a quiet space for travel, lifestyle, everyday rituals, and simple living,
      shaped by movement, stillness, and the moments in between
    </p>

    <div class="coming">Coming Soon</div>
  </main>
</body>
</html>
