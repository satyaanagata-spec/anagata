<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=3.0">
  <title>ANAGATA</title>

  <!-- Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #F7F3EE;
      color: #0F2A44;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    .wrap {
      max-width: 700px;
      width: 100%;
    }

    .logo {
      width: 330px;
      max-width: 90%;
      margin: 0 auto 75px auto;
      display: block;
    }

    /* GOLD ACCENT */
    .eyebrow {
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #C6A96B;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(20px, 4.5vw, 44px);
      line-height: 1.2;
      font-weight: 400;
      margin-bottom: 18px;
      color: #0F2A44;
    }

    .subtext {
      max-width: 520px;
      margin: 0 auto 20px auto;
      font-size: 14px;
      line-height: 1.8;
      font-weight: 300;
      color: #0F2A44;
    }

    /* GOLD ACCENT */
    .coming {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #C6A96B;
      margin-top: 18px;
    }

    @media (max-width: 768px) {
      .logo {
        width: 180px;
        margin-bottom: 40px;
      }

      h1 {
        font-size: 26px;
      }

      .subtext {
        font-size: 13px;
        max-width: 300px;
      }

      .eyebrow {
        letter-spacing: 4px;
      }

      .coming {
        letter-spacing: 4px;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <img src="./anagata.png" alt="ANAGATA" class="logo">

    <div class="eyebrow">A personal journal</div>

    <h1>
      Somewhere Between<br>
      Here and There
    </h1>

    <div class="subtext">
      A quiet space for travel, lifestyle, and everyday rituals shaped by movement, stillness, and the moments in between
    </div>

    <div class="coming">Coming soon</div>

  </div>

</body>
</html>
