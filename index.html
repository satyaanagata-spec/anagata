<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANAGATA</title>

  <!-- New fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Manrope:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f4ef;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Manrope', sans-serif;
      color: #2b2b2b;
      text-align: center;
    }

    .container {
      max-width: 720px;
      padding: 40px 24px;
      transform: translateY(-20px);
      animation: fadeUp 1.2s ease;
    }

    .logo {
      width: 440px;
      max-width: 90%;
      display: block;
      margin: 0 auto 70px;
      opacity: 0.95;
    }

    .tagline {
      font-size: 10px;
      letter-spacing: 5px;
      color: #9a9a9a;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .description {
      max-width: 540px;
      margin: 0 auto 40px;
      font-size: 14px;
      line-height: 1.8;
      color: #6a6a6a;
    }

    .coming {
      font-size: 10px;
      letter-spacing: 6px;
      color: #b5b5b5;
      transition: 0.3s;
    }

    .coming:hover {
      letter-spacing: 8px;
      color: #8a8a8a;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(-20px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="./OLLA.png" class="logo" alt="ANAGATA logo">

    <div class="tagline">quietly becoming</div>

    <div class="headline">ESCAPE THE ORDINARY</div>

    <div class="description">
      between flights and quiet moments, notes on travel, simplicity, and a life well curated
    </div>

    <div class="coming">COMING SOON</div>
  </div>
</body>
</html>
