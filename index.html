<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANAGATA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0F2A44;
      --gold: #C6A96B;
      --cream: #F7F3EE;
      --text-soft: #5c6c79;
      --line: rgba(15, 42, 68, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--cream);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      text-align: center;
      padding: 48px 24px 36px;
    }

    .page {
      width: 100%;
      max-width: 820px;
      padding-top: 10px;
    }

    .logo {
      width: 300px;
      max-width: 80%;
      display: block;
      margin: 0 auto 34px;
    }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(64px, 7vw, 92px);
      line-height: 0.9;
      font-weight: 500;
      letter-spacing: 0.01em;
      margin: 0;
    }

    .divider {
      width: 44px;
      height: 1px;
      background: var(--line);
      margin: 26px auto 26px;
    }

    .description {
      max-width: 620px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.95;
      color: var(--text-soft);
    }

    .coming {
      margin-top: 38px;
      font-size: 10px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
    }

    @media (max-width: 640px) {
      body {
        padding: 34px 18px 28px;
      }

      .logo {
        width: 220px;
        margin-bottom: 28px;
      }

      .tagline {
        margin-bottom: 14px;
      }

      .headline {
        line-height: 0.95;
      }

      .divider {
        margin: 22px auto;
      }

      .description {
        font-size: 14px;
        line-height: 1.85;
      }

      .coming {
        margin-top: 30px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <img src="./OLLA.png" class="logo" alt="ANAGATA logo" />

    <div class="tagline">a personal journal</div>

    <h1 class="headline">
      Somewhere Between<br>
      Here and There
    </h1>

    <div class="divider"></div>

    <p class="description">
      a quiet space for travel, lifestyle, everyday rituals, and simple living,
      shaped by movement, stillness, and the beauty of ordinary moments
    </p>

    <div class="coming">Coming Soon</div>
  </main>
</body>
</html>
