<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OLLA</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #f7f6f2;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Inter', sans-serif;
  color: #2b2b2b;
}

.container {
  text-align: center;
  max-width: 600px;
}

/* LOGO */
.logo {
  width: 380px;
  max-width: 90%;
  margin-bottom: 60px;
}

/* small text */
.small {
  font-size: 12px;
  letter-spacing: 3px;
  color: #888;
  margin-bottom: 12px;
}

/* headline */
.title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  letter-spacing: 3px;
  margin-bottom: 20px;
}

/* description */
.desc {
  font-size: 13px;
  color: #777;
  line-height: 1.8;
  margin-bottom: 40px;
}

/* coming soon */
.coming {
  font-size: 11px;
  letter-spacing: 4px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

  <img src="./OLLA.png" class="logo" alt="OLLA">

  <div class="small">quietly becoming</div>

  <div class="title">ESCAPE THE ORDINARY</div>

  <div class="desc">
    between flights and quiet moments, notes on travel, simplicity, and a life well curated
  </div>

  <div class="coming">COMING SOON</div>

</div>

</body>
</html>
