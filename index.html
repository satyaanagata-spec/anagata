<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANAGATA</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0F2A44;
      --gold: #C6A96B;
      --cream: #F7F3EE;
      --text-soft: #5c6c79;
      --line: rgba(15, 42, 68, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
    }

    /* HEADER */
    .header {
      padding: 28px 40px 20px;
      text-align: center;
    }

    .logo {
      width: 360px; /* 👈 bigger */
      max-width: 90%;
      display: block;
      margin: 0 auto 16px; /* 👈 higher */
    }

    .line {
      border-top: 1px solid var(--line);
      margin-top: 14px;
    }

    /* MAIN */
    .main {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 5vw, 58px); /* 👈 smaller */
      line-height: 1;
      margin: 0;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--line);
      margin: 22px auto;
    }

    .description {
      max-width: 560px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.9;
      color: var(--text-soft);
    }

    .coming {
      margin-top: 34px;
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* MOBILE */
    @media (max-width: 640px) {
      .header {
        padding: 20px;
      }

      .logo {
        width: 260px;
      }

      .main {
        padding: 40px 20px;
      }

      .headline {
        font-size: 38px;
      }

      .description {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER (like Audrey style) -->
  <div class="header">
    <img src="./OLLA.png" class="logo" alt="ANAGATA logo">
    <div class="line"></div>
  </div>

  <!-- CONTENT -->
  <div class="main">

    <div class="tagline">a personal journal</div>

    <h1 class="headline">
      Somewhere Between<br>
      Here and There
    </h1>

    <div class="divider"></div>

    <p class="description">
      a quiet space for travel, lifestyle, everyday rituals, and simple living,
      shaped by movement, stillness, and the moments in between
    </p>

    <div class="coming">Coming Soon</div>

  </div>

</body>
</html>
