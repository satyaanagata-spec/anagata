<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANAGATA</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0F2A44;
      --gold: #C6A96B;
      --cream: #F7F3EE;
      --text-soft: #5c6c79;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
    }

    /* HEADER */
    .header {
      padding: 8px 40px 4px; /* 👈 very high */
      text-align: center;
    }

    .logo {
      width: 420px; /* 👈 strong */
      max-width: 92%;
      display: block;
      margin: 0 auto 2px; /* 👈 tight */
    }

    /* MAIN */
    .main {
      text-align: center;
      padding: 30px 20px 24px; /* 👈 pulled up */
    }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 3.2vw, 34px); /* 👈 smaller */
      line-height: 1.05;
      margin: 0;
    }

    .description {
      max-width: 460px;
      margin: 10px auto 0;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-soft);
    }

    .coming {
      margin-top: 14px;
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* MOBILE */
    @media (max-width: 640px) {
      .header {
        padding: 6px 20px 2px;
      }

      .logo {
        width: 260px;
      }

      .main {
        padding: 24px 16px;
      }

      .headline {
        font-size: 24px;
      }

      .description {
        font-size: 12.5px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="2.png" class="logo" alt="ANAGATA logo">
  </div>

  <!-- CONTENT -->
  <div class="main">

    <div class="tagline">a personal journal</div>

    <h1 class="headline">
      Somewhere Between<br>
      Here and There
    </h1>

    <p class="description">
      a quiet space for travel, lifestyle, everyday rituals, and simple living,
      shaped by movement, stillness, and the moments in between
    </p>

    <div class="coming">Coming Soon</div>

  </div>

</body>
</html>
