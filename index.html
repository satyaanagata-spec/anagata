<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANAGATA</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0F2A44;
      --gold: #C6A96B;
      --cream: #F7F3EE;
      --text: #566775;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--cream);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      text-align: center;
      padding: 24px 20px 20px; /* 👈 tighter top */
    }

    .wrap {
      width: 100%;
      max-width: 700px;
    }

    .logo {
      width: 220px; /* 👈 SMALLER = removes ugly box dominance */
      max-width: 80%;
      display: block;
      margin: 0 auto 40px; /* 👈 higher */
    }

    .tagline {
      font-size: 9px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 5vw, 58px);
      line-height: 0.95;
      font-weight: 500;
      margin: 0;
    }

    .description {
      max-width: 520px;
      margin: 18px auto 0;
      font-size: 13.5px;
      line-height: 1.8;
      color: var(--text);
    }

    .coming {
      margin-top: 20px;
      font-size: 9px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
    }

    @media (max-width: 640px) {
      body {
        padding: 18px 16px 16px;
      }

      .logo {
        width: 180px;
        margin-bottom: 28px;
      }

      .headline {
        font-size: 34px;
      }

      .description {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">

    <img src="2.png" class="logo" alt="ANAGATA logo">

    <div class="tagline">a personal journal</div>

    <h1 class="headline">
      Somewhere Between<br>
      Here and There
    </h1>

    <p class="description">
      a quiet space for travel, lifestyle, everyday rituals, and simple living,
      shaped by movement, stillness, and the moments in between
    </p>

    <div class="coming">Coming Soon</div>

  </main>
</body>
</html>
