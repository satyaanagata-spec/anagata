<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANAGATA</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f6f2;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      color: #2c2c2c;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px 24px;
      transform: translateY(-20px);
    }

    .logo {
      width: 460px;
      max-width: 90%;
      display: block;
      margin: 0 auto 64px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 4px;
      color: #8d8d8d;
      margin-bottom: 18px;
      text-transform: lowercase;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .description {
      max-width: 560px;
      margin: 0 auto 36px;
      font-size: 14px;
      line-height: 1.9;
      color: #6f6f6f;
    }

    .coming {
      font-size: 11px;
      letter-spacing: 5px;
      color: #b1b1b1;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="./OLLA.png" class="logo" alt="ANAGATA logo">

    <div class="tagline">quietly becoming</div>

    <div class="headline">ESCAPE THE ORDINARY</div>

    <div class="description">
      between flights and quiet moments, notes on travel, simplicity, and a life well curated
    </div>

    <div class="coming">COMING SOON</div>
  </div>
</body>
</html>
