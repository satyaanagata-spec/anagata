<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANAGATA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #F7F3EE;
      color: #0F2A44;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-50px);
    }

    .logo {
      width: 340px;
      max-width: 80vw;
      margin-bottom: 90px;
      display: block;
    }

    .eyebrow {
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #C6A96B;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(42px, 5vw, 62px);
      line-height: 1.08;
      font-weight: 400;
      margin-bottom: 22px;
      color: #0F2A44;
    }

    .subtext {
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.8;
      color: #3d4c5a;
      max-width: 620px;
      margin-bottom: 28px;
    }

    .coming-soon {
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #C6A96B;
    }

    @media (max-width: 768px) {
      .wrap {
        transform: translateY(-20px);
      }

      .logo {
        width: 270px;
        margin-bottom: 65px;
      }

      h1 {
        font-size: 38px;
      }

      .subtext {
        font-size: 15px;
        line-height: 1.7;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="2PNG.png" alt="ANAGATA logo" class="logo" />

    <div class="eyebrow">A personal journal</div>

    <h1>Somewhere Between<br>Here and There</h1>

    <p class="subtext">
      A quiet space for travel, stillness, and everyday rituals.
    </p>

    <div class="coming-soon">Coming soon</div>
  </main>
</body>
</html>
