<!DOCTYPE html>
<html>
<head>
  <title>anagata</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f8f8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      text-align: center;
      max-width: 650px;
      padding: 20px;
    }

    .logo {
      width: 220px;
      margin-bottom: 30px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      color: #777;
    }

    .headline {
      margin-top: 25px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #1a1a1a;
    }

    .description {
      margin-top: 20px;
      font-size: 13px;
      color: #8a8a8a;
      line-height: 1.8;
    }

    .coming {
      margin-top: 30px;
      font-size: 11px;
      letter-spacing: 4px;
      color: #b5b5b5;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="Anagata Logo.png" class="logo">

    <div class="tagline">
      quietly becoming
    </div>

    <div class="headline">
      ESCAPE THE ORDINARY
    </div>

    <div class="description">
      between flights and quiet moments —  
      notes on travel, simplicity, and a life well curated
    </div>

    <div class="coming">
      COMING SOON
    </div>

  </div>

</body>
</html>
