<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANAGATA</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0F2A44;
      --gold: #C6A96B;
      --cream: #F7F3EE;
      --text-soft: #44576c;
      --line: rgba(15, 42, 68, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--cream);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      letter-spacing: 0.01em;
    }

    .page {
      width: 100%;
      max-width: 760px;
      animation: fadeIn 1.1s ease;
      transform: translateY(-10px);
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 88px;
    }

    .nav a {
      text-decoration: none;
      color: var(--navy);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.82;
      transition: 0.25s;
    }

    .nav a:hover {
      color: var(--gold);
      opacity: 1;
    }

    .logo {
      width: 420px;
      max-width: 88%;
      display: block;
      margin: -18px auto 72px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 26px;
    }

    .headline {
      font-family: 'EB Garamond', serif;
      font-size: clamp(42px, 6vw, 64px);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    .divider {
      width: 56px;
      height: 1px;
      background: var(--line);
      margin: 40px auto;
    }

    .description {
      max-width: 560px;
      margin: 0 auto;
      font-size: 14px;
      line-height: 2;
      color: var(--text-soft);
    }

    .coming {
      margin-top: 64px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      transition: 0.3s;
    }

    .coming:hover {
      letter-spacing: 0.35em;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    @media (max-width: 640px) {
      .nav {
        gap: 16px;
        margin-bottom: 60px;
        flex-wrap: wrap;
      }

      .description {
        font-size: 13px;
        line-height: 1.9;
      }

      .coming {
        margin-top: 50px;
      }
    }
  </style>
</head>
<body>
  <main class="page">

    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">Journal</a>
      <a href="#">About</a>
    </nav>

    <img src="./OLLA.png" class="logo" alt="ANAGATA logo" />

    <div class="tagline">a personal journal</div>

    <h1 class="headline">
      Somewhere Between<br />
      Here and There
    </h1>

    <div class="divider"></div>

    <p class="description">
      a quiet space for travel, lifestyle, everyday rituals, and simple living,
      shaped by movement, stillness, and the moments in between
    </p>

    <div class="coming">Coming Soon</div>

  </main>
</body>
</html>
