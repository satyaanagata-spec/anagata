<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANAGATA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #F7F3EE;
      color: #0F2A44;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 820px;
      transform: translateY(-45px);
    }

    .logo {
      display: block;
      width: 420px;
      max-width: 88%;
      height: auto;
      margin: 0 auto 44px auto;
    }

    .eyebrow {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #C6A96B;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(34px, 5.4vw, 66px);
      line-height: 1.05;
      font-weight: 400;
      margin-bottom: 16px;
      color: #0F2A44;
    }

    .subtext {
      font-family: Arial, sans-serif;
      font-size: 15px;
      line-height: 1.8;
      color: #4A5968;
      max-width: 560px;
      margin: 0 auto 22px auto;
    }

    .coming {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #C6A96B;
    }

    @media (max-width: 768px) {
      body {
        padding: 24px 18px;
      }

      .wrap {
        transform: translateY(-10px);
      }

      .logo {
        width: 250px;
        max-width: 82%;
        margin-bottom: 34px;
      }

      .eyebrow {
        font-size: 10px;
        letter-spacing: 4px;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin-bottom: 14px;
      }

      .subtext {
        font-size: 14px;
        line-height: 1.7;
        max-width: 320px;
        margin-bottom: 18px;
      }

      .coming {
        font-size: 10px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="./anagata.png" alt="ANAGATA logo" class="logo" />
    <div class="eyebrow">A personal journal</div>
    <h1>Somewhere Between<br>Here and There</h1>
    <p class="subtext">Travel, stillness, and the moments in between</p>
    <div class="coming">Coming soon</div>
  </main>
</body>
</html>
