<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANAGATA</title>

  <!-- Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #F7F3EE;
      color: #0F2A44;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    .wrap {
      max-width: 700px;
      width: 100%;
    }

    .logo {
      width: 240px;
      max-width: 80%;
      margin: 0 auto 45px auto;
      display: block;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #0F2A44;
      margin-bottom: 16px;
      font-weight: 400;
    }

    h1 {
      font-size: clamp(36px, 5.5vw, 64px);
      line-height: 1.1;
      font-weight: 400;
      margin-bottom: 20px;
      color: #0F2A44;
    }

    .subtext {
      max-width: 520px;
      margin: 0 auto 26px auto;
      font-size: 15px;
      line-height: 1.9;
      font-weight: 300;
      color: #0F2A44;
    }

    .coming {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #0F2A44;
      margin-bottom: 28px;
    }

    .about {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #0F2A44;
      text-decoration: none;
      border-bottom: 1px solid #0F2A44;
      padding-bottom: 3px;
      transition: opacity 0.2s ease;
    }

    .about:hover {
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      .logo {
        width: 190px;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 30px;
      }

      .subtext {
        font-size: 14px;
        max-width: 300px;
      }

      .eyebrow {
        letter-spacing: 4px;
      }

      .coming {
        letter-spacing: 4px;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <img src="./anagata.png" alt="ANAGATA" class="logo">

    <div class="eyebrow">A personal journal</div>

    <h1>
      Somewhere Between<br>
      Here and There
    </h1>

    <div class="subtext">
      A quiet space for travel, lifestyle, and everyday rituals shaped by movement, stillness, and the moments in between
    </div>

    <div class="coming">Coming soon</div>

    <a href="about.html" class="about">About</a>

  </div>

</body>
</html>
