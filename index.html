<!DOCTYPE html>
<html>
<head>
  <title>anagata</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f8f8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 6px;
      color: #1a1a1a;
      margin: 0;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    .subtle {
      font-size: 12px;
      letter-spacing: 3px;
      color: #888;
      margin-top: 15px;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* soft grain overlay */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.08;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>ANAGATA</h1>
    <div class="subtle">quietly becoming</div>
  </div>

</body>
</html>
