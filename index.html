<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAGATA</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #F7F3EE;
  color: #0F2A44;
  font-family: Georgia, "Times New Roman", serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.wrap {
  transform: translateY(-90px);
  width: 100%;
  max-width: 800px;
}

/* LOGO — bigger + higher */
.logo {
  width: 420px;
  max-width: 85%;
  margin-bottom: 70px;
}

/* SMALL GOLD TEXT */
.eyebrow {
  font-family: Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #C6A96B;
  margin-bottom: 15px;
}

/* MAIN TITLE */
h1 {
  font-size: 64px;
  line-height: 1.05;
  font-weight: 400;
  margin-bottom: 20px;
}

/* CLEAN SHORT SUBTEXT */
.subtext {
  font-family: Arial, sans-serif;
  font-size: 15px;
  color: #3d4c5a;
  margin-bottom: 26px;
}

/* COMING SOON */
.coming {
  font-family: Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #C6A96B;
}

/* MOBILE */
@media (max-width: 768px) {
  .wrap {
    transform: translateY(-40px);
  }

  .logo {
    width: 300px;
    margin-bottom: 50px;
  }

  h1 {
    font-size: 38px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <img src="2PNG.png" class="logo">

  <div class="eyebrow">A personal journal</div>

  <h1>
    Somewhere Between<br>
    Here and There
  </h1>

  <div class="subtext">
    Travel, stillness, and the moments in between
  </div>

  <div class="coming">
    Coming soon
  </div>

</div>

</body>
</html>
